<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar · Lawson Sport Performance</title>
<style>
:root{--navy:#0F2244;--navy-deep:#0A1930;--gold:#FFC72C;--gold-dark:#8A6D00;--sky:#8FC9E8;--sky-soft:#E4F1FA;--paper:#F4F8FC;--card:#fff;--line:#DCE5EF;--muted:#55647A}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--navy);font-family:system-ui,-apple-system,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:860px;margin:0 auto;padding:0 16px 60px}

.sitenav{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;padding-bottom:14px;margin-bottom:14px;border-bottom:1px solid rgba(255,255,255,.14)}
.sitenav .navbrand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#fff;text-decoration:none}
.sitenav .navbrand svg{width:13px}.sitenav .navbrand span{color:var(--gold)}
.sitenav .links{display:flex;gap:16px;flex-wrap:wrap;font-family:ui-monospace,monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase}
.sitenav .links a{color:var(--sky);text-decoration:none}
.sitenav .links a.on{color:var(--gold)}
header{background:linear-gradient(160deg,var(--navy),var(--navy-deep));color:#fff;padding:18px 0 22px;position:relative;overflow:hidden;margin-bottom:16px}
.brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase}
.brand svg{width:13px}.brand span{color:var(--gold)}
.today{margin-top:10px;font-size:20px;font-weight:900;letter-spacing:-.01em}
.today small{display:block;font-size:12px;color:var(--sky);font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-family:ui-monospace,monospace;margin-top:3px}
.lane{position:absolute;inset:auto 0 0 0;height:7px;background:repeating-linear-gradient(-45deg,var(--gold) 0 34px,var(--sky) 34px 44px,transparent 44px 58px)}
.dateline{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.dateline input{padding:9px 11px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;color:var(--navy);background:var(--card)}
.dateline button{padding:9px 14px;border:none;border-radius:10px;background:var(--navy);color:#fff;font-weight:800;font-size:12.5px;cursor:pointer}
.dateline .gear{background:var(--card);color:var(--navy);border:1.5px solid var(--line)}
.tcard{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.thead{display:grid;grid-template-columns:86px 1fr auto;gap:12px;align-items:center;padding:14px 16px;cursor:pointer}
.ttime{font-family:ui-monospace,monospace;font-weight:700;font-size:13px;color:var(--gold-dark)}
.tname{font-weight:900;font-size:16px}
.tsub{font-size:12px;color:var(--muted);font-family:ui-monospace,monospace;margin-top:2px}
.tbadges{display:flex;gap:6px;align-items:center}
.badge{font-size:9.5px;font-weight:800;letter-spacing:.08em;border-radius:5px;padding:3px 8px;white-space:nowrap}
.b-wk{background:var(--sky-soft);color:var(--navy)}
.b-dl{background:var(--sky);color:var(--navy)}
.b-spd{background:var(--gold);color:var(--navy)}
.b-set{background:#FDE8E8;color:#9B2C2C}
.chev{color:var(--muted);font-size:13px;margin-left:4px}
.tbody{display:none;border-top:1px solid var(--line)}
.tcard.open .tbody{display:block}
.sesshead{background:var(--navy);color:#fff;padding:10px 16px;font-weight:800;font-size:13.5px;border-left:5px solid var(--gold);display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.sesshead .wu{font-family:ui-monospace,monospace;font-size:11px;color:var(--sky);font-weight:600}
.brow{display:grid;grid-template-columns:34px 1fr;gap:2px 12px;padding:10px 16px;border-bottom:1px solid var(--line)}
.brow:last-child{border-bottom:none}
.blk{font-family:ui-monospace,monospace;font-weight:700;color:var(--gold-dark);font-size:13px}
.ex{font-weight:700;font-size:14px}
.rx{grid-column:2;color:var(--muted);font-size:13px}
.empty{background:var(--card);border:1px dashed var(--line);border-radius:14px;padding:26px;text-align:center;color:var(--muted)}
.settings{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;display:none}
.settings.open{display:block}
.settings h3{font-size:14px;font-weight:900;margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.srow{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.srow:last-of-type{border-bottom:none}
.srow label{font-weight:700;font-size:13.5px}
.srow small{display:block;font-weight:500;color:var(--muted);font-size:11.5px}
.srow input{padding:7px 9px;border:1.5px solid var(--line);border-radius:8px;font-size:13px}
.savebtn{margin-top:12px;width:100%;padding:11px;border:none;border-radius:10px;background:var(--gold);color:var(--navy);font-weight:900;font-size:13.5px;cursor:pointer}
.note{font-size:12px;color:var(--muted);text-align:center;margin-top:10px}
.b-test{background:var(--gold);color:var(--navy)}
.kpiban{border-radius:14px;padding:14px 16px;margin-bottom:14px;font-weight:700;font-size:14px;display:none;align-items:center;gap:10px}
.kpiban.show{display:flex}
.kpiban.upcoming{background:#FFF7DE;border:1.5px solid var(--gold);color:var(--navy)}
.kpiban.live{background:var(--navy);border:1.5px solid var(--navy);color:#fff}
.kpiban .k{font-family:ui-monospace,monospace;font-size:10px;font-weight:800;letter-spacing:.1em;background:var(--gold);color:var(--navy);border-radius:5px;padding:3px 8px;white-space:nowrap}
.kpiban small{display:block;font-weight:500;font-size:12px;opacity:.8}
.cdown{display:none;background:linear-gradient(160deg,var(--navy),var(--navy-deep));color:#fff;border-radius:14px;padding:14px 16px;margin-bottom:14px;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.cdown.show{display:flex}
.cdown .lab{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--sky)}
.cdown .lab b{display:block;color:#fff;font-size:14px;letter-spacing:.02em;text-transform:none;margin-top:2px}
.cdigits{display:flex;gap:8px}
.cd{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:7px 10px;text-align:center;min-width:56px}
.cd b{display:block;font-family:ui-monospace,monospace;font-size:22px;font-weight:800;color:var(--gold);line-height:1.1}
.cd span{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--sky)}
</style></head><body>

async function loadStarts(){ try{ const r = localStorage.getItem("team-start-dates"); if(r) Object.assign(starts, JSON.parse(r)); }catch(e){} }
async function saveStarts(){
  TEAMS.forEach(t=>{ const v=document.getElementById("sd-"+t.id).value; if(v) starts[t.id]=v; });
  try{ localStorage.setItem("team-start-dates", JSON.stringify(starts)); }catch(e){}
  document.getElementById('settings').classList.remove('open'); render();
}
function weekFor(t, date){
  const s = starts[t.id]; if(!s) return null;
  const days = Math.floor((date - new Date(s+"T00:00:00"))/86400000);
  if(days<0) return null;
  return Math.min(15, Math.floor(days/7)+1);
}
function goToday(){ document.getElementById("viewdate").value = new Date().toISOString().slice(0,10); render(); }
function render(){
  const dstr = document.getElementById("viewdate").value;
  const date = new Date(dstr+"T12:00:00");
  const dow = date.getDay();
  document.getElementById("todayline").childNodes[0].textContent = date.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
  // settings rows
  document.getElementById("srows").innerHTML = TEAMS.map(t=>
   `<div class="srow"><label>${t.name}<small>${t.prog==="football"?"Football 4-Day":"All-Sport 2-Day"} · ${t.time}</small></label>
    <input type="date" id="sd-${t.id}" value="${starts[t.id]||""}"></div>`).join("");

  if(date > SUMMER_END){
    const ban0 = document.getElementById("kpibanner"); ban0.className="kpiban"; ban0.innerHTML="";

    document.getElementById("snapshot").innerHTML = `<div class="empty">The summer schedule wrapped up Thursday, July 30. The school-year schedule — with new session times — is coming soon.</div>`;
    return;
  }
  // KPI banner
  const ban = document.getElementById("kpibanner");

    const wk = weekFor(t, date); if(!wk) return;

    else if(KPI_WEEKS.includes(wk+1)){
      upTeams.push({t,wk:wk+1});
      const dd = (8 - date.getDay()) % 7 || 7; // days until next Monday
      upDays = dd;
    }
  });
  if(liveTeams.length){
    const wks=[...new Set(liveTeams.map(x=>x.wk))].join(" & ");

  } else { ban.className="kpiban"; ban.innerHTML=""; }
  const box = document.getElementById("snapshot");

    } else {
      if(!wk){ badges=`<span class="badge b-set">SET START DATE</span>`; sub = (t.prog==="football"?"Football 4-Day":"All-Sport 2-Day"); body = `<div class="brow"><div class="blk">!</div><div class="ex">Set this team's Week 1 date under ⚙</div></div>`; }
      else{

        badges = `<span class="badge b-wk">WK ${wk} · DAY ${slot+1}</span>` + (w.deload?`<span class="badge b-dl">DELOAD</span>`:"");
        const tst = (TESTMAP[t.prog][wk]||{})[slot];
        if(tst){ badges += `<span class="badge b-test">TEST</span>`; sub0 = "TEST: "+tst; }
        sub = (typeof sub0!=="undefined" && sub0? sub0+" · " : "") + `${t.prog==="football"?"Football 4-Day":"All-Sport 2-Day"}${t.tag?" · "+t.tag:""} · ${w.wu}`; sub0=undefined;
        body = `<div class="sesshead"><span>${d.title}</span><span class="wu">Warm-Up: ${w.wu}</span></div>` +
          d.rows.map(r=>`<div class="brow"><div class="blk">${r[0]}</div><div class="ex">${r[1]}</div><div class="rx">${r[2]}</div></div>`).join("");
      }
    }
    return `<div class="tcard" id="tc-${t.id}">
      <div class="thead" onclick="document.getElementById('tc-${t.id}').classList.toggle('open')">
        <div class="ttime">${t.time}</div>
        <div><div class="tname">${t.name}</div><div class="tsub">${sub}</div></div>
        <div class="tbadges">${badges}<span class="chev">▾</span></div>
      </div>
      <div class="tbody">${body}</div>
    </div>`;
  }).join("");
}
function nextKpiTarget(){
  const now = new Date();
  let best = null;
  TEAMS.forEach(t=>{
    const s = starts[t.id]; if(!s) return;
    KPI_WEEKS.forEach(K=>{
      const d = new Date(s+"T07:00:00");   // testing starts with the 7:00 session
      d.setDate(d.getDate() + (K-1)*7);
      if(d > now && d <= SUMMER_END && (!best || d < best.d)) best = {d, K};
    });
  });
  return best;
}
function tick(){
  const el = document.getElementById("cdown");
  const tgt = nextKpiTarget();
  const now = new Date();
  // hide the countdown while a KPI week is live for any team
  const live = TEAMS.some(t=>{ const wk = weekFor(t, now); return wk && KPI_WEEKS.includes(wk); });
  if(!tgt || live){ el.classList.remove("show"); return; }
  el.classList.add("show");
  document.getElementById("cdlabel").textContent = `Week ${tgt.K} · ${tgt.d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})} · 7:00 AM`;
  let ms = tgt.d - now;
  const dd = Math.floor(ms/86400000); ms -= dd*86400000;
  const hh = Math.floor(ms/3600000);  ms -= hh*3600000;
  const mm = Math.floor(ms/60000);    ms -= mm*60000;
  const ss = Math.floor(ms/1000);
  document.getElementById("cd-d").textContent = dd;
  document.getElementById("cd-h").textContent = String(hh).padStart(2,"0");
  document.getElementById("cd-m").textContent = String(mm).padStart(2,"0");
  document.getElementById("cd-s").textContent = String(ss).padStart(2,"0");
}
(async ()=>{ await loadStarts(); goToday(); tick(); setInterval(tick, 1000); })();
</script>
